<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR印刷（A4）</title>

  <style>
    body {
      margin: 0;
      background: #f2f2f2;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #111;
    }

    /* ===== Toolbar（上部：個人情報はここだけ） ===== */
    .toolbar {
      max-width: 1100px;
      margin: 16px auto;
      padding: 0 16px;
      position: relative;
      height: 44px;
      display: flex;
      align-items: center;
    }
    .toolbar button {
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
      z-index: 1;
    }
    .toolbarLine {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      white-space: nowrap;
      pointer-events: none;
    }

    /* スマホ・タブレットではツールバー自体を非表示（＝個人情報も出ない） */
    @media (pointer: coarse) {
      .toolbar { display: none !important; }
    }

    /* ===== Page ===== */
    .page {
      width: 210mm;
      height: 297mm;
      margin: 12px auto 24px;
      background: #fff;
      box-shadow: 0 6px 24px rgba(0,0,0,.12);
      border-radius: 10px;
      box-sizing: border-box;
      padding: 15mm;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10mm;
    }

    .title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid #e5e5e5;
      padding-bottom: 6mm;
    }
    .title h1 {
      font-size: 18pt;
      margin: 0;
    }
    .title .meta {
      font-size: 10.5pt;
      color: #333;
      word-break: break-all;
    }

    /* ===== QR領域：画面サイズに追従 ===== */
    .qrArea {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .qrBox {
      /* 画面が狭い時は縮む。広い時でも大きくしすぎない */
      width: min(520px, 90vw);
      max-width: 120mm; /* 印刷レイアウトを壊しにくい上限 */
      padding: 10mm;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
    }

    /* フッター（個人情報は一切出さない） */
    .footer {
      border-top: 1px solid #e5e5e5;
      padding-top: 6mm;
      font-size: 10pt;
      color: #444;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    @page { size: A4; margin: 0; }

    /* 印刷時：ツールバー（個人情報）を完全非表示 */
    @media print {
      .no-print { display: none !important; }
      .page {
        margin: 0;
        border-radius: 0;
        box-shadow: none;
      }

      /* 印刷ではA4前提のサイズに固定したい場合（任意） */
      .qrBox {
        width: 120mm;
        max-width: 120mm;
      }
    }
  </style>
</head>

<body>
  <!-- 上部（画面表示のみ：個人情報はここだけ） -->
  <div class="toolbar no-print">
    <button id="printBtn">A4で印刷</button>
    <div class="toolbarLine" id="toolbarLine"></div>
  </div>

  <section class="page">
    <div class="title">
      <h1>QRコード</h1>
      <div class="meta" id="metaLine"></div>
    </div>

    <div class="qrArea">
      <div class="qrBox" id="qrBox">
        <canvas id="qrCanvas"></canvas>
      </div>
    </div>

    <div class="footer">
      <div>Generated by GitHub Pages</div>
      <div id="footerInfo"></div>
    </div>
  </section>

  <!-- QRコード生成ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

  <script>
    const params = new URLSearchParams(location.search);

    // 個人情報（上部のみ表示に使用）
    const k = params.get("k") ?? "";
    const b = params.get("b") ?? "";
    const y = params.get("y") ?? "";
    const n = params.get("n") ?? "";

    // QRの中身（uのみ）
    const payload = params.get("u") ?? "";

    // （表示用）未指定時の置換
    const v = (s) => (s && s.trim()) ? s : "（未指定）";

    // 上部ツールバー中央：個人情報を表示（画面のみ）
    document.getElementById("toolbarLine").textContent =
      `会社名：${v(k)}／部署：${v(b)}／役職：${v(y)}／お名前：${v(n)} 様`;

    // メタ・フッター（個人情報は入れない）
    const ecc = "M";
    document.getElementById("metaLine").textContent = `ecc=${ecc} / responsive`;
    document.getElementById("footerInfo").textContent = new Date().toLocaleString();

    // ===== QRを表示サイズに合わせて再描画 =====
    const canvas = document.getElementById("qrCanvas");
    const box = document.getElementById("qrBox");

    function computeQrWidthPx() {
      // 表示領域の実幅を取得し、読み取りしやすい偶数に丸め
      const w = Math.floor(box.getBoundingClientRect().width);
      // 小さすぎると読みにくいので下限を設定（必要なら調整）
      const clamped = Math.max(160, Math.min(w, 900));
      return clamped - (clamped % 2);
    }

    function renderQr() {
      const width = computeQrWidthPx();
      QRCode.toCanvas(
        canvas,
        payload || "（u が指定されていません）",
        { width, margin: 2, errorCorrectionLevel: ecc },
        (err) => { if (err) console.error(err); }
      );
    }

    // リサイズは間引く
    let t = 0;
    function scheduleRender() {
      clearTimeout(t);
      t = setTimeout(renderQr, 120);
    }

    // 初回描画
    renderQr();

    // 画面サイズ変更に追従
    window.addEventListener("resize", scheduleRender);

    // 印刷
    document.getElementById("printBtn").addEventListener("click", () => window.print());

    // URL引数を非表示（表示後に履歴を汚さない）
    // replaceState は現在の履歴エントリのURLを置き換えます。oper.mozilla.org/en-US/docs/Web/API/History/replaceState)
    if (location.search) {
      history.replaceState(null, document.title, location.pathname);
    }
  </script>
</body>
</html>
