<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR印刷（A4）</title>

  <style>
    body {
      margin: 0;
      background: #f2f2f2;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #111;
    }

    /* ===== Toolbar（画面表示のみ） ===== */
    .toolbar {
      max-width: 1100px;
      margin: 16px auto;
      padding: 0 16px;
      position: relative;
      height: 44px;
      display: flex;
      align-items: center;
    }
    .toolbar button {
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      z-index: 1;
    }
    .toolbarLine {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      white-space: nowrap;
      pointer-events: none;
    }

    @media (pointer: coarse) {
      .toolbar { display: none !important; }
    }

    /* ===== Page ===== */
    .page {
      width: min(1100px, 96vw);
      margin: 12px auto 24px;
      background: #fff;
      box-shadow: 0 6px 24px rgba(0,0,0,.12);
      border-radius: 10px;
      padding: 24px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 24px;
      position: relative;
    }

    .title {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #e5e5e5;
      padding-bottom: 16px;
    }
    .title h1 { margin: 0; font-size: 18pt; }
    .title .meta { font-size: 10.5pt; color: #333; }

    /* ===== QR ===== */
    .qrArea--one {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .qrBox--one {
      width: min(520px, 90vw);
      padding: 12px;
    }

    .qrArea--two {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10mm;
      justify-items: center;
    }
    .qrBox--two {
      width: 80mm;
      padding: 5mm;
    }

    canvas { width: 100%; display: block; }

    .footer {
      border-top: 1px solid #e5e5e5;
      padding-top: 16px;
      font-size: 10pt;
      display: flex;
      justify-content: space-between;
    }

    /* ===== A4プレビュー ===== */
    body.a4-preview .page {
      width: 210mm;
      height: 297mm;
      padding: 15mm;
      gap: 10mm;
    }
    body.a4-preview .qrArea--one { display: none; }
    body.a4-preview .qrArea--two { display: grid; }

    /* ===== 十字罫線（薄い実線・背景不使用） ===== */
    body.a4-preview .page::before,
    body.a4-preview .page::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 9999;
    }

    body.a4-preview .page::before {
      top: 0; bottom: 0;
      left: 50%;
      transform: translateX(-0.15mm);
      border-left: 0.3mm solid rgba(0,0,0,.2);
    }

    body.a4-preview .page::after {
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-0.15mm);
      border-top: 0.3mm solid rgba(0,0,0,.2);
    }

    /* ===== 印刷 ===== */
    @page { size: A4; margin: 0; }

    @media print {
      .no-print { display: none !important; }

      body { background: #fff; }

      .page {
        width: 210mm;
        height: 297mm;
        margin: 0;
        border-radius: 0;
        box-shadow: none;
        padding: 15mm;
        gap: 10mm;
      }

      .qrArea--one { display: none !important; }
      .qrArea--two { display: grid !important; }

      .page::before,
      .page::after {
        content: "";
        position: absolute;
        pointer-events: none;
        z-index: 9999;
      }

      .page::before {
        top: 0; bottom: 0;
        left: 50%;
        transform: translateX(-0.15mm);
        border-left: 0.3mm solid rgba(0,0,0,.25);
      }

      .page::after {
        left: 0; right: 0;
        top: 50%;
        transform: translateY(-0.15mm);
        border-top: 0.3mm solid rgba(0,0,0,.25);
      }
    }
  </style>
</head>

<body>
  <div class="toolbar no-print">
    <button id="printBtn">A4で印刷</button>
    <div class="toolbarLine" id="toolbarLine"></div>
  </div>

  <section class="page">
    <div class="title">
      <h1>QRコード</h1>
      <div class="meta" id="metaLine"></div>
    </div>

    <div class="qrArea--one">
      <div class="qrBox--one">
        <canvas id="qrCanvasOne"></canvas>
      </div>
    </div>

    <div class="qrArea--two">
      <div class="qrBox--two"><canvas id="qrCanvasLeft"></canvas></div>
      <div class="qrBox--two"><canvas id="qrCanvasRight"></canvas></div>
    </div>

    <div class="footer">
      <div>Generated by GitHub Pages</div>
      <div id="footerInfo"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const payload = params.get("u") ?? "";

    document.getElementById("toolbarLine").textContent =
      `会社名：${params.get("k") ?? "（未指定）"} ／ お名前：${params.get("n") ?? "（未指定）"} 様`;

    document.getElementById("metaLine").textContent = "ecc=M / responsive";
    document.getElementById("footerInfo").textContent = new Date().toLocaleString();

    function render(canvasId) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      QRCode.toCanvas(canvas, payload || "（u未指定）", {
        width: canvas.parentElement.clientWidth,
        margin: 2,
        errorCorrectionLevel: "M"
      });
    }

    function renderAll() {
      render("qrCanvasOne");
      render("qrCanvasLeft");
      render("qrCanvasRight");
    }

    renderAll();
    window.addEventListener("resize", () => setTimeout(renderAll, 100));

    document.getElementById("printBtn").onclick = () => {
      document.body.classList.add("a4-preview");
      renderAll();
      window.print();
    };

    window.addEventListener("afterprint", () => {
      document.body.classList.remove("a4-preview");
      renderAll();
    });

    if (location.search) {
      history.replaceState(null, document.title, location.pathname);
    }
  </script>
</body>
</html>
