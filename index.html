<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR印刷（A4）</title>

<style>
body{
  margin:0;
  background:#f2f2f2;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
}

/* ===== Toolbar（画面のみ） ===== */
.toolbar{
  max-width:1100px;
  margin:16px auto;
  padding:0 16px;
  position:relative;
  height:44px;
  display:flex;
  align-items:center;
}
.toolbar button{
  border:1px solid #ccc;
  background:#fff;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
}
.toolbarLine{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  white-space:nowrap;
}
@media (pointer:coarse){
  .toolbar{display:none!important;}
}

/* ===== 画面表示 ===== */
.page{
  width:min(1100px,96vw);
  margin:12px auto;
  background:#fff;
  padding:24px;
  border-radius:10px;
  box-shadow:0 6px 24px rgba(0,0,0,.12);
}
.previewQr{
  max-width:520px;
  margin:0 auto;
}
canvas{width:100%;height:auto;}

/* ===== 印刷設定 ===== */
@page{size:A4;margin:0;}

@media print{
  .no-print{display:none!important;}
  body{background:#fff;}

  .page{
    width:210mm;
    height:297mm;
    margin:0;
    padding:0;
    border-radius:0;
    box-shadow:none;
    position:relative;
  }

  /* === 折り目点線（必ず表示） === */
  .fold-lines{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:1;

    --c: rgba(0,0,0,0.25);
    --gap: 2.2mm;
    --dot: 0.6mm;
    --w: 0.25mm;

    background:
      repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent var(--gap),
        var(--c) var(--gap),
        var(--c) calc(var(--gap) + var(--dot))
      ),
      repeating-linear-gradient(
        to right,
        transparent 0,
        transparent var(--gap),
        var(--c) var(--gap),
        var(--c) calc(var(--gap) + var(--dot))
      );

    background-size: var(--w) 100%, 100% var(--w);
    background-position: 50% 0, 0 50%;
    background-repeat:no-repeat;
  }

  /* === 2×2 グリッド === */
  .qrGrid{
    position:absolute;
    inset:0;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    z-index:2; /* 点線の上 */
  }

  .cell{
    display:flex;
    justify-content:center;
    align-items:center;
  }

  /* 上段のみQR */
  .cell.top canvas{
    width:80mm;
    max-width:80mm;
    height:auto;
  }
}
</style>
</head>

<body>

<div class="toolbar no-print">
  <button onclick="window.print()">A4で印刷</button>
  <div class="toolbarLine" id="toolbarLine"></div>
</div>

<section class="page">

  <!-- 画面プレビュー用QR -->
  <div class="previewQr no-print">
    <canvas id="qrPreview"></canvas>
  </div>

  <!-- 印刷用 -->
  <div class="fold-lines"></div>

  <div class="qrGrid">
    <div class="cell top"><canvas id="qrTL"></canvas></div>
    <div class="cell top"><canvas id="qrTR"></canvas></div>
    <div class="cell"></div>
    <div class="cell"></div>
  </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
<script>
const params=new URLSearchParams(location.search);
const u=params.get("u")||"https://example.com";

const make=(c,w)=>QRCode.toCanvas(c,u,{width:w,margin:2});

make(document.getElementById("qrPreview"),480);
make(document.getElementById("qrTL"),600);
make(document.getElementById("qrTR"),600);

document.getElementById("toolbarLine").textContent=
  `会社名：${params.get("k")||"（未指定）"} ／ お名前：${params.get("n")||""} 様`;

if(location.search){
  history.replaceState(null,document.title,location.pathname);
}
</script>

</body>
</html>
