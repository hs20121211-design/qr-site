<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR印刷（A4）</title>

  <style>
    body {
      margin: 0;
      background: #f2f2f2;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #111;
    }

    /* ===== Toolbar（上部：個人情報はここだけ） ===== */
    .toolbar {
      max-width: 1100px;
      margin: 16px auto;
      padding: 0 16px;
      position: relative;
      height: 44px;
      display: flex;
      align-items: center;
    }
    .toolbar button {
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
      z-index: 1;
    }
    .toolbarLine {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      white-space: nowrap;
      pointer-events: none;
    }

    /* スマホ・タブレットではツールバー自体を非表示（＝個人情報も出ない） */
    @media (pointer: coarse) {
      .toolbar { display: none !important; }
    }

    /* ===== Page：初期表示はA4固定にしない（レスポンシブ） ===== */
    .page {
      width: min(1100px, 96vw);
      height: auto;
      margin: 12px auto 24px;
      background: #fff;
      box-shadow: 0 6px 24px rgba(0,0,0,.12);
      border-radius: 10px;
      box-sizing: border-box;
      padding: 24px; /* 画面用 */
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 24px;
      position: relative; /* 罫線の重ね描き用 */
    }

    .title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid #e5e5e5;
      padding-bottom: 16px;
    }
    .title h1 { font-size: 18pt; margin: 0; }
    .title .meta {
      font-size: 10.5pt;
      color: #333;
      word-break: break-all;
    }

    /* ===== QR：画面サイズに追従 ===== */
    .qrArea {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .qrBox {
      width: min(520px, 90vw);
      padding: 12px;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
    }

    /* フッター（個人情報は一切出さない） */
    .footer {
      border-top: 1px solid #e5e5e5;
      padding-top: 16px;
      font-size: 10pt;
      color: #444;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    /* ===== クリック時だけ「画面上でA4」プレビューに切替 ===== */
    body.a4-preview .page {
      width: 210mm;
      height: 297mm;
      padding: 15mm;
      gap: 10mm;
    }
    body.a4-preview .title { padding-bottom: 6mm; }
    body.a4-preview .footer { padding-top: 6mm; }
    body.a4-preview .qrBox {
      width: 120mm;
      padding: 10mm;
    }

    /* =====★ A4プレビュー中（画面）に十字罫線を表示（任意：見たい場合） ===== */
    body.a4-preview .page::before,
    body.a4-preview .page::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 5;
    }
    /* 縦罫線 */
    body.a4-preview .page::before {
      top: 0; bottom: 0;
      left: 50%;
      border-left: 0.3mm solid rgba(0,0,0,.45);
      transform: translateX(-0.15mm);
    }
    /* 横罫線 */
    body.a4-preview .page::after {
      left: 0; right: 0;
      top: 50%;
      border-top: 0.3mm solid rgba(0,0,0,.45);
      transform: translateY(-0.15mm);
    }

    /* ===== 印刷（A4） ===== */
    @page { size: A4; margin: 0; } /* 印刷時の用紙設定 [1](https://developer.mozilla.org/en-US/docs/Web/CSS/Guides/Media_queries/Printing) */

    @media print {
      /* 印刷時：個人情報を含むUIは非表示 */
      .no-print { display: none !important; }

      /* 印刷時はA4固定 */
      .page {
        width: 210mm;
        height: 297mm;
        margin: 0;
        border-radius: 0;
        box-shadow: none;
        padding: 15mm;
        gap: 10mm;
        position: relative; /* 罫線の基準 */
      }
      .qrBox {
        width: 120mm;
        padding: 10mm;
      }
      body { background: #fff; }

      /* =====★ 印刷プレビューでA4縦横中央に十字罫線（4マス） ===== */
      .page::before,
      .page::after {
        content: "";
        position: absolute;
        pointer-events: none;
        z-index: 9999; /* 文字やQRの上に線を出したい場合 */
      }
      /* 縦罫線：ページの真ん中 */
      .page::before {
        top: 0; bottom: 0;
        left: 50%;
        border-left: 0.3mm solid #000; /* 罫線の太さ・色（好みで調整） */
        transform: translateX(-0.15mm);
      }
      /* 横罫線：ページの真ん中 */
      .page::after {
        left: 0; right: 0;
        top: 50%;
        border-top: 0.3mm solid #000;
        transform: translateY(-0.15mm);
      }
    }
  </style>
</head>

<body>
  <!-- 上部（画面表示のみ：個人情報はここだけ） -->
  <div class="toolbar no-print">
    <button id="printBtn">A4で印刷</button>
    <div class="toolbarLine" id="toolbarLine"></div>
  </div>

  <section class="page" id="page">
    <div class="title">
      <h1>QRコード</h1>
      <div class="meta" id="metaLine"></div>
    </div>

    <div class="qrArea">
      <div class="qrBox" id="qrBox">
        <canvas id="qrCanvas"></canvas>
      </div>
    </div>

    <div class="footer">
      <div>Generated by GitHub Pages</div>
      <div id="footerInfo"></div>
    </div>
  </section>

  <!-- QRコード生成ライブラリ（正しいscriptタグ） -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

  <script>
    const params = new URLSearchParams(location.search);

    // 個人情報（上部のみ表示）
    const k = params.get("k") ?? "";
    const b = params.get("b") ?? "";
    const y = params.get("y") ?? "";
    const n = params.get("n") ?? "";

    // QRの中身（uのみ）
    const payload = params.get("u") ?? "";

    // （表示用）未指定時の置換
    const v = (s) => (s && s.trim()) ? s : "（未指定）";

    // 上部ツールバー中央：個人情報を表示（画面のみ）
    document.getElementById("toolbarLine").textContent =
      `会社名：${v(k)}／部署：${v(b)}／役職：${v(y)}／お名前：${v(n)} 様`;

    // メタ・フッター（個人情報なし）
    const ecc = "M";
    document.getElementById("metaLine").textContent = `ecc=${ecc} / responsive`;
    document.getElementById("footerInfo").textContent = new Date().toLocaleString();

    // ===== QRを表示サイズに合わせて再描画（widthオプション） =====
    const canvas = document.getElementById("qrCanvas");
    const box = document.getElementById("qrBox");

    function computeQrWidthPx() {
      const w = Math.floor(box.getBoundingClientRect().width);
      const clamped = Math.max(160, Math.min(w, 1100));
      return clamped - (clamped % 2);
    }

    function renderQr() {
      const width = computeQrWidthPx();
      // QRCode.toCanvas は width オプションで描画サイズを指定できる [3](https://www.npmjs.com/package/qrcode/v/1.4.4)
      QRCode.toCanvas(
        canvas,
        payload || "（u が指定されていません）",
        { width, margin: 2, errorCorrectionLevel: ecc },
        (err) => { if (err) console.error(err); }
      );
    }

    // リサイズは間引き
    let t = 0;
    function scheduleRender() {
      clearTimeout(t);
      t = setTimeout(renderQr, 120);
    }
    window.addEventListener("resize", scheduleRender);

    // 初回描画
    renderQr();

    // ===== 「A4で印刷」クリック時だけA4プレビュー → 印刷 → 戻す =====
    const printBtn = document.getElementById("printBtn");

    function enableA4Preview() {
      document.body.classList.add("a4-preview");
      renderQr(); // サイズが変わるので再描画
    }
    function disableA4Preview() {
      document.body.classList.remove("a4-preview");
      renderQr();
    }

    // 印刷/プレビュー終了後に元へ戻す（afterprint） [2](https://developer.mozilla.org/en-US/docs/Web/API/Window/afterprint_event)
    window.addEventListener("afterprint", () => {
      disableA4Preview();
    });

    printBtn.addEventListener("click", () => {
      enableA4Preview();
      window.print();
    });

    // URL引数を非表示（履歴を汚さない）
    if (location.search) {
      history.replaceState(null, document.title, location.pathname);
    }
  </script>
</body>
</html>
